services:
  - type: web
    name: mindvault-ai
    env: python
    buildCommand: ./build.sh
    startCommand: uvicorn backend_api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: GROQ_API_KEY
        sync: false # Set in Render Dashboard
